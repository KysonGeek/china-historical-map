<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>中国历史疆域图</title>
<script>document.documentElement.dataset.theme = localStorage.getItem('hmap-theme') || 'dark';</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #191713;
    --bg-raised: #221f19;
    --line: #3a352b;
    --ink: #e8dcc0;
    --ink-2: #b3a888;
    --ink-3: #7d745e;
    --accent: #bb8a29;
    --accent-ink: #1a1608;
    --track-edge: #55471f;
    --card-bg: rgba(30, 27, 21, .92);
    --card-hl: rgba(232, 220, 192, .08);
    --shadow: rgba(0, 0, 0, .45);
    --label-shadow: rgba(0, 0, 0, .85);
    --serif: "Noto Serif SC", "Songti SC", "STSong", "SimSun", Georgia, serif;
  }
  :root[data-theme="light"] {
    --bg: #ece3d0;
    --bg-raised: #e3d8c1;
    --line: #c9bb9e;
    --ink: #3a3021;
    --ink-2: #6b5d45;
    --ink-3: #948569;
    --accent: #9c6f14;
    --accent-ink: #f7f0dd;
    --track-edge: #cdbd97;
    --card-bg: rgba(243, 236, 220, .93);
    --card-hl: rgba(58, 48, 33, .08);
    --shadow: rgba(80, 60, 20, .25);
    --label-shadow: rgba(236, 227, 208, .9);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--serif);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ---------- header ---------- */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 20px 10px;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 21px; font-weight: 900; letter-spacing: .18em;
    color: var(--ink);
  }
  header .sub { font-size: 12px; color: var(--ink-3); letter-spacing: .1em; }
  header .spacer { flex: 1; }
  #themeBtn {
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid var(--line); background: transparent;
    color: var(--ink-2); font-size: 15px; line-height: 1;
    cursor: pointer; transition: color .2s, border-color .2s, transform .3s;
  }
  #themeBtn:hover { color: var(--ink); border-color: var(--ink-3); transform: rotate(30deg); }
  .toggle {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--ink-2); cursor: pointer; user-select: none;
  }
  .toggle input { display: none; }
  .toggle .track {
    width: 34px; height: 18px; border-radius: 9px;
    background: var(--line); position: relative; transition: background .25s;
  }
  .toggle .track::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--ink-2); transition: transform .25s, background .25s;
  }
  .toggle input:checked + .track { background: var(--accent); }
  .toggle input:checked + .track::after { transform: translateX(16px); background: var(--accent-ink); }

  /* ---------- map area ---------- */
  #stage { position: relative; flex: 1; min-height: 0; }
  #map { position: absolute; inset: 0; }
  #stage::before { /* vignette for old-map depth; below canvas, purely decorative */
    content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse 90% 80% at 50% 45%, rgba(60,50,30,.14), transparent 60%),
                radial-gradient(ellipse 140% 120% at 50% 50%, transparent 55%, rgba(0,0,0,.45));
  }
  :root[data-theme="light"] #stage::before {
    background: radial-gradient(ellipse 90% 80% at 50% 45%, rgba(160,130,70,.10), transparent 60%),
                radial-gradient(ellipse 140% 120% at 50% 50%, transparent 60%, rgba(120,95,45,.22));
  }
  #overlay { position: absolute; inset: 0; pointer-events: none; z-index: 3; overflow: hidden; }
  .regime-label {
    position: absolute; transform: translate(-50%, -50%);
    font-weight: 900; letter-spacing: .38em; text-indent: .38em; /* centers spaced glyphs */
    white-space: nowrap; opacity: 0;
    transition: opacity .7s ease;
    text-shadow: 0 1px 3px var(--label-shadow), 0 0 14px var(--label-shadow);
  }
  .capital-mark {
    position: absolute; transform: translate(-50%, -50%);
    font-size: 11px; letter-spacing: .12em; color: var(--ink);
    white-space: nowrap; opacity: 0; transition: opacity .7s ease .15s;
    text-shadow: 0 1px 2px var(--label-shadow);
  }
  .capital-mark::before {
    content: "◉ "; font-size: 9px; color: var(--ink);
  }
  #overlay.shown .regime-label, #overlay.shown .capital-mark { opacity: 1; }

  /* ---------- info card ---------- */
  #card {
    position: absolute; top: 14px; right: 14px; z-index: 4;
    width: 276px; max-width: calc(100% - 28px);
    max-height: calc(100% - 60px); overflow-y: auto;
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 14px 16px;
    backdrop-filter: blur(4px);
    box-shadow: 0 6px 24px var(--shadow);
    transition: opacity .3s;
    scrollbar-width: thin;
  }
  #card .period-title { font-size: 18px; font-weight: 900; letter-spacing: .22em; }
  #card .period-years { font-size: 12px; color: var(--ink-3); margin: 2px 0 10px; letter-spacing: .05em; }
  #card ul { list-style: none; }
  #card li {
    display: flex; align-items: baseline; gap: 8px;
    padding: 3px 6px; margin: 0 -6px; font-size: 13px; border-radius: 4px;
    color: var(--ink-2); transition: background .2s, color .2s;
  }
  #card li.active { background: var(--card-hl); color: var(--ink); }
  .chip { width: 10px; height: 10px; border-radius: 2px; flex: none; align-self: center; }
  #card li .r-name { font-weight: 600; color: var(--ink); }
  #card li .r-years { font-size: 11px; color: var(--ink-3); margin-left: auto; white-space: nowrap; }
  #card .detail {
    margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line);
    font-size: 12.5px; line-height: 1.75; color: var(--ink-2);
  }
  #card .detail .d-head { font-size: 14px; font-weight: 600; color: var(--ink); letter-spacing: .05em; }
  #card .detail .d-cap { color: var(--ink); }
  #card .detail .d-prov { color: var(--ink-3); font-size: 11.5px; margin-top: 2px; }
  #card .hint { margin-top: 10px; font-size: 11px; color: var(--ink-3); }

  /* ---------- disclaimer / status ---------- */
  #disclaimer {
    position: absolute; left: 14px; bottom: 10px; z-index: 4;
    font-size: 11px; color: var(--ink-3); letter-spacing: .06em;
    text-shadow: 0 1px 2px var(--label-shadow);
  }
  #status {
    position: absolute; inset: 0; z-index: 5;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; letter-spacing: .3em; color: var(--ink-3);
    background: var(--bg); text-align: center; line-height: 2;
  }

  /* ---------- timeline ---------- */
  #timeline {
    border-top: 1px solid var(--line);
    background: var(--bg-raised);
    padding: 8px 20px 14px;
  }
  #yearBadge {
    text-align: center; font-size: 12px; color: var(--ink-3);
    letter-spacing: .12em; margin-bottom: 4px; min-height: 18px;
  }
  #yearBadge b { font-size: 14px; color: var(--ink); font-weight: 600; margin-right: 2px; }
  #slider {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 22px; background: transparent; cursor: pointer;
    touch-action: pan-x; display: block;
  }
  #slider::-webkit-slider-runnable-track {
    height: 3px; border-radius: 2px;
    background: linear-gradient(90deg, var(--track-edge), var(--accent), var(--track-edge));
  }
  #slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 17px; height: 17px; margin-top: -7px; border-radius: 50%;
    background: var(--ink); border: 3px solid var(--accent);
    box-shadow: 0 0 0 4px var(--card-hl);
  }
  #slider::-moz-range-track {
    height: 3px; border-radius: 2px;
    background: linear-gradient(90deg, var(--track-edge), var(--accent), var(--track-edge));
  }
  #slider::-moz-range-thumb {
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--ink); border: 3px solid var(--accent);
    box-shadow: 0 0 0 4px var(--card-hl);
  }
  #eras {
    display: flex; gap: 6px; margin-top: 10px;
    overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  #eras::-webkit-scrollbar { display: none; }
  #eras button {
    flex: 1 0 auto; min-width: 42px;
    font-family: var(--serif); font-size: 12.5px; letter-spacing: .06em;
    color: var(--ink-2);
    background: transparent; border: 1px solid var(--line); border-radius: 4px;
    padding: 6px 8px; cursor: pointer;
    transition: color .2s, border-color .2s, background .2s;
  }
  #eras button:hover { color: var(--ink); border-color: var(--ink-3); }
  #eras button.active {
    color: var(--accent-ink); background: var(--accent); border-color: var(--accent);
    font-weight: 600;
  }

  @media (max-width: 640px) {
    header { padding: 10px 14px 8px; gap: 10px; }
    header h1 { font-size: 17px; }
    header .sub { display: none; }
    #card { top: 8px; left: 8px; right: 8px; width: auto; padding: 10px 12px;
            max-height: 44%; }
    #card .detail { font-size: 12px; line-height: 1.6; }
    #card .hint { display: none; }
    #timeline { padding: 8px 12px 12px; }
    #disclaimer { font-size: 10px; right: 14px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .regime-label, .capital-mark { transition: none; }
  }
</style>
</head>
<body>

<header>
  <h1>中国历史疆域图</h1>
  <span class="sub">秦 · 前221年 —— 现代</span>
  <span class="spacer"></span>
  <button id="themeBtn" aria-label="切换明暗主题" title="切换明暗主题">☀</button>
  <label class="toggle">
    <input type="checkbox" id="borderToggle" checked>
    <span class="track"></span>
    <span>现代省界</span>
  </label>
</header>

<div id="stage">
  <div id="map"></div>
  <div id="overlay"></div>
  <div id="card" hidden></div>
  <div id="disclaimer">疆域为示意性近似(按现代省份组合划分),非严格史实边界</div>
  <div id="status">地图数据加载中 …</div>
</div>

<div id="timeline">
  <div id="yearBadge"></div>
  <input type="range" id="slider" min="0" max="21" step="1" value="0" aria-label="历史年份">
  <div id="eras"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<script>
/* =====================================================================
 *  疆域数据在 territories.json 中(年份断面 → 政权 → 现代省份映射)。
 *  直接修改该 JSON 文件即可修正疆域划分,字段说明见 README。
 * ===================================================================== */

let ALL = [];        // 省级行政区简称列表(来自 territories.json)
let SNAPSHOTS = [];  // 年份断面
let ERAS = [];       // 时期快捷按钮 -> 首个断面索引
let PALETTE = { dark: {}, light: {} };

function indexData(data) {
  ALL = data.provinces;
  SNAPSHOTS = data.snapshots;
  PALETTE = data.palette;
  provOf = SNAPSHOTS.map(s => {
    const m = {};
    s.regimes.forEach(r => r.provinces.forEach(p => { m[p] = r; }));
    return m;
  });
  ERAS = [];
  SNAPSHOTS.forEach((s, i) => {
    if (!ERAS.length || ERAS[ERAS.length - 1].name !== s.era) ERAS.push({ name: s.era, first: i });
  });
}

const yearText = y => y < 0 ? `前${-y}年` : (y < 1000 ? `公元${y}年` : `${y}年`);

/* ============================ 实现区 ============================ */

const GEO_URLS = [
  'https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json',
  'https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/json/china.json',
];
const ALIAS = {
  '内蒙古自治区':'内蒙古','广西壮族自治区':'广西','西藏自治区':'西藏',
  '宁夏回族自治区':'宁夏','新疆维吾尔自治区':'新疆',
  '香港特别行政区':'香港','澳门特别行政区':'澳门',
};
const shortName = n => !n ? n : (ALIAS[n] || n.replace(/(省|市)$/, ''));

/* 主题相关的地图着色参数(与 CSS 变量对应) */
const THEME_CFG = {
  dark:  { border: 'rgba(232,220,192,.22)', emphBorder: '#e8dcc0',
           labelMix: [238, 226, 200], labelAmt: .45,
           emphMix: [238, 226, 200], emphAmt: .18, emphNeutral: '#3a352b' },
  light: { border: 'rgba(58,48,33,.30)', emphBorder: '#3a3021',
           labelMix: [40, 30, 14], labelAmt: .35,
           emphMix: [30, 24, 12], emphAmt: .16, emphNeutral: '#c8b995' },
};

const $ = id => document.getElementById(id);
const stage = $('stage'), overlay = $('overlay'), card = $('card'),
      slider = $('slider'), eras = $('eras'), statusEl = $('status'),
      themeBtn = $('themeBtn');

const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
let chart = null;
let theme = localStorage.getItem('hmap-theme') || 'dark';
let cur = 0;                 // 当前断面索引
let colState = {};           // 省份 -> 当前显示颜色 [r,g,b](动画中间态)
let animId = null;
let pinned = null;           // 移动端点选后固定显示的政权
let showBorders = true;      // 现代省界开关
let provOf = [];             // 每个断面: 省份 -> 政权 的索引(indexData 中构建)

/* ---------- 颜色工具 ---------- */
const hex2rgb = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
const rgbStr = c => `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;
const lerp3 = (a, b, t) => [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];
const mixTo = (hex, target, f) => rgbStr(lerp3(hex2rgb(hex), target, f));
/* regime.color 是 palette 中的键(明暗主题各取一套),也兼容直接写 #RRGGBB */
const col = r => PALETTE[theme][r.color] || r.color;
const neutral = () => PALETTE[theme].neutral || '#2e2a23';
const labelTone = hex => mixTo(hex, THEME_CFG[theme].labelMix, THEME_CFG[theme].labelAmt);
const emphTone  = hex => mixTo(hex, THEME_CFG[theme].emphMix,  THEME_CFG[theme].emphAmt);

function targetColors(pi) {
  const t = {};
  ALL.forEach(p => { const r = provOf[pi][p]; t[p] = hex2rgb(r ? col(r) : neutral()); });
  return t;
}

/* ---------- 地图初始化 ---------- */
function fetchJSON(url, timeout) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeout);
  return fetch(url, { signal: ctrl.signal })
    .then(res => { if (!res.ok) throw new Error(url + ' HTTP ' + res.status); return res.json(); })
    .finally(() => clearTimeout(timer));
}

async function fetchGeo() {
  for (const url of GEO_URLS) {
    try { return await fetchJSON(url, 15000); }
    catch (e) { console.warn('geojson 源失败,尝试备用源', url, e); }
  }
  throw new Error('所有地图数据源均不可用');
}

function buildChart(geo) {
  geo.features.forEach(f => { f.properties.name = shortName(f.properties.name); });
  echarts.registerMap('china', geo);
  chart = echarts.init($('map'), null, { renderer: 'canvas' });

  colState = targetColors(0);
  chart.setOption({
    animation: false,          // 过渡动画由下方 rAF 插值驱动,更可控
    backgroundColor: 'transparent',
    tooltip: { show: false },
    series: [{
      id: 'terr', type: 'map', map: 'china',
      roam: false, selectedMode: false,
      layoutCenter: ['50%', '48%'], layoutSize: '108%',
      boundingCoords: [[73, 54], [136, 17.5]],   // 以大陆为构图主体,南海诸岛贴近下缘
      itemStyle: {
        areaColor: neutral(),
        borderColor: THEME_CFG[theme].border, borderWidth: 0.6,
      },
      emphasis: { label: { show: false }, itemStyle: { borderColor: THEME_CFG[theme].emphBorder, borderWidth: 1.2 } },
      label: { show: false },
      data: mapData(),
    }],
  });

  chart.on('mouseover', e => { if (e.seriesId === 'terr' && !pinned) hoverProvince(e.name); });
  chart.on('mouseout',  e => { if (e.seriesId === 'terr' && !pinned) hoverProvince(null); });
  chart.on('click', e => {
    if (e.seriesId !== 'terr') return;
    const r = provOf[cur][e.name];
    pinned = (pinned && r && pinned === r) ? null : r || null;
    hoverProvince(pinned ? e.name : null);
  });
  chart.getZr().on('click', e => {           // 点击空白处取消固定
    if (!e.target) { pinned = null; hoverProvince(null); }
  });
}

function mapData(emphasisReady = true) {
  return ALL.map(n => {
    const fill = rgbStr(colState[n]);
    const item = { name: n, itemStyle: { areaColor: fill } };
    if (!showBorders) {
      // 省界关闭时,用与填充同色的描边盖住相邻多边形的拼接缝,同政权区域即融为一体
      item.itemStyle.borderColor = fill;
      item.itemStyle.borderWidth = 1;
    }
    if (emphasisReady) {
      const r = provOf[cur][n];
      item.emphasis = { itemStyle: { areaColor: r ? emphTone(col(r)) : THEME_CFG[theme].emphNeutral } };
    }
    return item;
  });
}

/* ---------- 色块平滑过渡(rAF 插值) ---------- */
function animateColors(to, instant) {
  const from = {}; ALL.forEach(p => from[p] = (colState[p] || to[p]).slice());
  cancelAnimationFrame(animId);
  const D = (instant || reduceMotion) ? 0 : 700;
  const t0 = performance.now();
  const frame = now => {
    const k = D ? Math.min(1, (now - t0) / D) : 1;
    const e = k < .5 ? 2*k*k : 1 - Math.pow(-2*k + 2, 2) / 2;   // ease-in-out
    ALL.forEach(p => { colState[p] = lerp3(from[p], to[p], e); });
    chart.setOption({ series: [{ id: 'terr', data: mapData(k >= 1) }] });
    if (k < 1) animId = requestAnimationFrame(frame);
  };
  animId = requestAnimationFrame(frame);
}

/* ---------- 断面切换 ---------- */
function switchPeriod(i, instant) {
  cur = i; pinned = null;
  slider.value = i;
  const snap = SNAPSHOTS[i];
  let ei = 0;
  ERAS.forEach((e, k) => { if (e.first <= i) ei = k; });
  [...eras.children].forEach((b, k) => b.classList.toggle('active', k === ei));
  eras.children[ei].scrollIntoView({ block: 'nearest', inline: 'nearest', behavior: 'smooth' });
  $('yearBadge').innerHTML = `<b>${yearText(snap.year)}</b> · ${snap.label}`;

  animateColors(targetColors(i), instant);
  renderOverlay();
  renderCard(null);
}

/* ---------- 明暗主题 ---------- */
function applyTheme(t, instant) {
  theme = t;
  localStorage.setItem('hmap-theme', t);
  document.documentElement.dataset.theme = t;
  themeBtn.textContent = t === 'dark' ? '☀' : '☾';
  if (!chart) return;
  chart.setOption({ series: [{ id: 'terr',
    itemStyle: { areaColor: neutral(), borderColor: THEME_CFG[t].border },
    emphasis: { itemStyle: { borderColor: THEME_CFG[t].emphBorder } },
  }] });
  animateColors(targetColors(cur), instant);
  renderOverlay();
  renderCard(null);
}

/* ---------- 政权名 / 都城 标注层 ---------- */
function renderOverlay() {
  overlay.classList.remove('shown');
  overlay.innerHTML = '';
  const per = SNAPSHOTS[cur];
  const box = stage.getBoundingClientRect();
  per.regimes.forEach(r => {
    const lp = toPixel(r.label);
    if (lp) {
      const el = document.createElement('div');
      el.className = 'regime-label';
      el.textContent = r.name;
      const scale = Math.min(1, box.width / 900);
      el.style.cssText = `left:${lp[0]}px;top:${lp[1]}px;font-size:${Math.max(12, (r.size || 14) * scale)}px;color:${labelTone(col(r))};`;
      overlay.appendChild(el);
    }
    const capName = r.capital.replace(/[((].*$/, '');       // 标注只取都城主名
    // 与政权同名(如大理)或都城不在图内(capCoord 为 null)时不画标记
    const cp = (capName === r.name || !r.capCoord) ? null : toPixel(r.capCoord);
    if (cp) {
      const el = document.createElement('div');
      el.className = 'capital-mark';
      el.textContent = capName;
      el.style.cssText = `left:${cp[0]}px;top:${cp[1] + 11}px;`;
      overlay.appendChild(el);
    }
  });
  requestAnimationFrame(() => requestAnimationFrame(() => overlay.classList.add('shown')));
}

function toPixel(lnglat) {
  try {
    const p = chart.convertToPixel({ seriesId: 'terr' }, lnglat);
    return (p && isFinite(p[0])) ? p : null;
  } catch (e) { return null; }
}

/* ---------- 信息卡片 ---------- */
function renderCard(hovProv) {
  const per = SNAPSHOTS[cur];
  const hovRegime = pinned || (hovProv ? provOf[cur][hovProv] : null);
  const outside = hovProv && !hovRegime && !pinned;

  let h = `<div class="period-title">${per.era}</div>
           <div class="period-years">${yearText(per.year)} · ${per.label}</div><ul>`;
  per.regimes.forEach(r => {
    h += `<li class="${r === hovRegime ? 'active' : ''}">
            <span class="chip" style="background:${col(r)}"></span>
            <span class="r-name">${r.name}</span>
            <span class="r-years">${r.years}</span>
          </li>`;
  });
  h += '</ul>';

  if (hovRegime) {
    h += `<div class="detail">
            <div class="d-head">${hovRegime.name}</div>
            <div>都城:<span class="d-cap">${hovRegime.capital}</span></div>
            <div>${hovRegime.desc}</div>
            ${hovProv ? `<div class="d-prov">所指区域:今${hovProv}</div>` : ''}
          </div>`;
  } else if (outside) {
    h += `<div class="detail">
            <div class="d-head">今${hovProv}</div>
            <div>此区域当时不属于所列政权,为周边部族或其他政权活动之地。</div>
          </div>`;
  } else {
    h += `<div class="hint">悬停或点触地图区域,查看政权详情。</div>`;
  }
  card.innerHTML = h;
  card.hidden = false;
}

function hoverProvince(name) { renderCard(name); }

/* ---------- 时间轴控件 ---------- */
function buildUI() {
  ERAS.forEach(e => {
    const b = document.createElement('button');
    b.textContent = e.name;
    b.addEventListener('click', () => switchPeriod(e.first));
    eras.appendChild(b);
  });
  slider.max = SNAPSHOTS.length - 1;
}
slider.addEventListener('input', () => switchPeriod(+slider.value));
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' && e.target !== slider) return;
  if (e.key === 'ArrowLeft'  && cur > 0)                    switchPeriod(cur - 1);
  if (e.key === 'ArrowRight' && cur < SNAPSHOTS.length - 1) switchPeriod(cur + 1);
});

themeBtn.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));

$('borderToggle').addEventListener('change', e => {
  showBorders = e.target.checked;
  if (!chart) return;
  chart.setOption({ series: [{
    id: 'terr',
    itemStyle: { borderWidth: showBorders ? 0.6 : 0 },
    data: mapData(),
  }] });
});

let resizeT = null;
window.addEventListener('resize', () => {
  if (!chart) return;
  chart.resize();
  clearTimeout(resizeT);
  resizeT = setTimeout(() => { renderOverlay(); overlay.classList.add('shown'); }, 120);
});

/* ---------- 启动 ---------- */
const fetchTerritories = () => fetchJSON('territories.json', 10000);

applyTheme(theme, true);
(async () => {
  try {
    const [geo, data] = await Promise.all([fetchGeo(), fetchTerritories()]);
    indexData(data);
    buildUI();
    buildChart(geo);
    statusEl.remove();
    switchPeriod(0, true);
  } catch (err) {
    statusEl.textContent = location.protocol === 'file:'
      ? '疆域数据需通过 HTTP 访问:请在本目录运行 python3 -m http.server 后打开 localhost 页面'
      : '地图数据加载失败,请检查网络后刷新重试';
    console.error(err);
  }
})();
</script>
